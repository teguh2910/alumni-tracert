services:
  mysql:
    image: mysql:8.0
    container_name: alumni-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-alumni_db}
      MYSQL_USER: ${MYSQL_USER:-alumni}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-alumni_pass}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alumni-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9099:9099"
      - "127.0.0.1:8099:8099"
    environment:
      APP_ENV: production
      DB_DRIVER: mysql
      DB_SOURCE: ${MYSQL_USER:-alumni}:${MYSQL_PASSWORD:-alumni_pass}@tcp(mysql:3306)/${MYSQL_DATABASE:-alumni_db}?parseTime=true
    volumes:
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alumni-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - backend

volumes:
  mysql_data:
  upload_data:
