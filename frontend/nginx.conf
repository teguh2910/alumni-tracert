# Frontend nginx config — listens on 8080, proxies to backend
# Host nginx handles SSL and routes to this container

server {
    listen 8080;
    server_name _;

    # Serve static frontend files
    root /usr/share/nginx/html;
    index index.html;

    # Proxy gRPC-web requests to backend (gRPC-web uses HTTP/1.1)
    location /proto.TracertService/ {
        proxy_pass http://backend:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type, Content-Length, Accept-Encoding, X-CSRF-Token, Authorization, X-User-Agent, X-Grpc-Web, Grpc-Status, Grpc-Message, Token" always;
        add_header Access-Control-Expose-Headers "Grpc-Status, Grpc-Message" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Proxy upload endpoint to backend
    location /upload {
        proxy_pass http://backend:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Proxy uploaded files to backend
    location /uploads/ {
        proxy_pass http://backend:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
